<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>CassetteRun</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>CassetteRun</h1>

  <!-- ── Cassette visual ── -->
  <div class="cassette" role="img" aria-label="カセットテープ">
    <div class="screws">
      <div class="screw"></div>
      <div class="screw"></div>
    </div>

    <div class="cassette-label">
      <div class="title">▶ NOW PLAYING</div>
      <div class="side">SIDE A &nbsp;|&nbsp; TYPE II</div>
    </div>

    <div class="reel-window">
      <div class="reel" id="reel-left"></div>
      <div class="tape-path"></div>
      <div id="tape-sag"></div>
      <div class="reel" id="reel-right"></div>
    </div>

    <div class="vu-meter">
      <div id="vu-fill"></div>
    </div>

    <div class="info-row">
      <span id="rate-display">0.00x</span>
      <span id="status-text">曲を選んでください</span>
    </div>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">

    <!-- Preset track list -->
    <div class="section-label">TRACK SELECT</div>
    <div id="track-list" class="track-list">
      <!-- JS で生成 -->
    </div>

    <!-- Custom MP3 -->
    <button id="custom-track-btn" class="custom-track-btn">
      📂 自分のMP3を使う
    </button>
    <input type="file" id="file-input"
           accept=".mp3,.m4a,.aac,.wav,.ogg,.flac,audio/*"
           style="display:none">

    <!-- Pitch mode toggle -->
    <div class="pitch-toggle-row">
      <span class="toggle-label" id="toggle-label-l">🎞 カセット</span>
      <label class="toggle-switch">
        <input type="checkbox" id="pitch-toggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <span class="toggle-label" id="toggle-label-r">♪ ピッチ固定</span>
    </div>

    <!-- Play / Stop -->
    <div class="btn-row">
      <button id="btn-start">▶ START</button>
      <button id="btn-stop" disabled>■ STOP</button>
    </div>

    <!-- iOS sensor permission -->
    <button id="btn-permission" style="display:none">
      センサーを許可する (iOS)
    </button>

    <!-- Desktop simulation -->
    <div class="sim-row">
      <span>DEBUG SPEED:</span>
      <input type="range" id="sim-slider" min="0" max="2" step="0.01" value="0">
      <span>2.0x</span>
    </div>

  </div>

  <footer>走らないと音楽が聴けない — v0.3</footer>

  <script type="module" src="js/main.js"></script>
  <script>
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      document.getElementById('btn-permission').style.display = 'block';
    }
  </script>
</body>
</html>
