<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CassetteRun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Cassette visual ── -->
  <div class="cassette">
    <div class="now-playing-label">▼Now Playing</div>
    <div class="now-playing-wrap">
      <span id="now-playing-text">Song Title / Artist name</span>
    </div>

    <div class="label-line"></div>

    <div class="reel-window">
      <div class="reel" id="reel-left">
        <svg class="reel-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="49" fill="white"/>
          <path fill="#111" d="M84.66 45.13 L95.55 43.60 L95.55 56.40 L84.66 54.87 A35 35 0 0 1 77.95 71.06 L86.74 77.68 L77.68 86.74 L71.06 77.95 A35 35 0 0 1 54.87 84.66 L56.40 95.55 L43.60 95.55 L45.13 84.66 A35 35 0 0 1 28.94 77.95 L22.32 86.74 L13.26 77.68 L22.05 71.06 A35 35 0 0 1 15.34 54.87 L4.45 56.40 L4.45 43.60 L15.34 45.13 A35 35 0 0 1 22.05 28.94 L13.26 22.32 L22.32 13.26 L28.94 22.05 A35 35 0 0 1 45.13 15.34 L43.60 4.45 L56.40 4.45 L54.87 15.34 A35 35 0 0 1 71.06 22.05 L77.68 13.26 L86.74 22.32 L77.95 28.94 A35 35 0 0 1 84.66 45.13 Z"/>
        </svg>
      </div>
      <div class="reel-spacer">
        <svg class="tape-head-shape" viewBox="0 0 42 66" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path d="M 0,0 C 11.5,20.9 11.5,45.1 0,66 L 42,66 C 30.5,45.1 30.5,20.9 42,0 Z" fill="#383838"/>
          <rect x="0" y="0" width="42" height="13" fill="#111212"/>
          <rect x="0" y="53" width="42" height="13" fill="#111212"/>
        </svg>
        <span id="rate-display">0.00x</span>
      </div>
      <div class="reel" id="reel-right">
        <svg class="reel-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="49" fill="white"/>
          <path fill="#111" d="M84.66 45.13 L95.55 43.60 L95.55 56.40 L84.66 54.87 A35 35 0 0 1 77.95 71.06 L86.74 77.68 L77.68 86.74 L71.06 77.95 A35 35 0 0 1 54.87 84.66 L56.40 95.55 L43.60 95.55 L45.13 84.66 A35 35 0 0 1 28.94 77.95 L22.32 86.74 L13.26 77.68 L22.05 71.06 A35 35 0 0 1 15.34 54.87 L4.45 56.40 L4.45 43.60 L15.34 45.13 A35 35 0 0 1 22.05 28.94 L13.26 22.32 L22.32 13.26 L28.94 22.05 A35 35 0 0 1 45.13 15.34 L43.60 4.45 L56.40 4.45 L54.87 15.34 A35 35 0 0 1 71.06 22.05 L77.68 13.26 L86.74 22.32 L77.95 28.94 A35 35 0 0 1 84.66 45.13 Z"/>
        </svg>
      </div>
    </div>

    <div class="vu-meter">
      <div id="vu-fill"></div>
    </div>

    <div class="cassette-footer">
      <span class="cassette-app-title">CASSETTE <span class="title-arrows" aria-hidden="true"></span>RUN</span>
    </div>

    <!-- Loading indicator (pitch-fixed mode only) -->
    <div id="loading-indicator" style="display:none">
      <div class="loading-header">
        <span id="loading-stage">-</span>
        <span id="loading-step">0 / 3</span>
      </div>
      <div class="loading-track">
        <div id="loading-fill"></div>
      </div>
    </div>
  </div>

  <!-- ── Deck controls ── -->
  <div class="controls">

    <!-- Tape status -->
    <div class="tape-status-panel">
      <span class="tape-status-label">TAPE</span>
      <span class="tape-status-name" id="tape-status-name">— NO TAPE —</span>
    </div>

    <!-- Row 1: SET buttons -->
    <div class="btn-row deck-row">
      <button id="btn-set-tape" class="deck-btn">SET TAPE</button>
      <button id="btn-set-single" class="deck-btn">SET SINGLE</button>
    </div>

    <!-- Row 2: Transport -->
    <div class="btn-row deck-row">
      <button id="btn-rew" class="deck-btn deck-transport">◀◀ REW</button>
      <button id="btn-playstop" class="deck-btn deck-transport deck-play">▶ PLAY</button>
      <button id="btn-ff" class="deck-btn deck-transport">FF ▶▶</button>
    </div>

    <!-- Toggles (compact) -->
    <div class="toggles-compact-row">
      <div class="pitch-toggle-row">
        <span class="toggle-label active" id="toggle-label-l">カセット</span>
        <label class="toggle-switch">
          <input type="checkbox" id="pitch-toggle">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
        <span class="toggle-label" id="toggle-label-r">ピッチ固定</span>
      </div>
      <div class="pitch-toggle-row">
        <span class="toggle-label active" id="motion-label-l">GPS</span>
        <label class="toggle-switch">
          <input type="checkbox" id="motion-toggle">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
        <span class="toggle-label" id="motion-label-r">センサー</span>
      </div>
    </div>

    <!-- Lock row -->
    <div class="lock-row">
      <span class="toggle-label active" id="lock-label-l">UNLOCK</span>
      <label class="toggle-switch">
        <input type="checkbox" id="lock-toggle">
        <span class="toggle-track lock-track"><span class="toggle-thumb"></span></span>
      </label>
      <span class="toggle-label" id="lock-label-r">LOCK</span>
    </div>

  </div>

  <!-- ── TAPE SELECT modal ── -->
  <div id="tape-modal" class="modal" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-overlay" id="tape-modal-overlay"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <button class="modal-back" id="tape-modal-back" style="display:none">◀</button>
        <span class="modal-title" id="tape-modal-title">SELECT TAPE</span>
        <button class="modal-shuffle" id="tape-modal-shuffle" style="display:none" aria-label="Shuffle">
          <img src="img/shuffle.png"
               srcset="img/shuffle.png 1x, img/shuffle@2x.png 2x, img/shuffle@3x.png 3x"
               width="25" height="18" alt="Shuffle" draggable="false">
        </button>
        <button class="modal-close" id="tape-modal-close">✕</button>
      </div>

      <!-- Sub-view: Tape list -->
      <div id="tape-view-list" class="tape-view">
        <div id="tape-list-container" class="modal-track-list"></div>
      </div>

      <!-- Sub-view: Tracks in selected tape -->
      <div id="tape-view-tracks" class="tape-view" style="display:none">
        <div id="tape-track-list" class="modal-track-list"></div>
        <div class="modal-action-bar">
          <button id="tape-set-btn" class="deck-btn-action">▶ SET THIS TAPE</button>
        </div>
      </div>

      <!-- Sub-view: New tape creation -->
      <div id="tape-view-new" class="tape-view" style="display:none">
        <div class="new-tape-header">
          <label class="new-tape-field-label">TAPE NAME</label>
          <input type="text" id="new-tape-name" class="new-tape-input" placeholder="My Mix" maxlength="30" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div id="new-tape-track-list" class="modal-track-list new-tape-tracks"></div>
        <div class="modal-action-bar new-tape-actions">
          <button id="new-tape-add-preset" class="deck-btn-sm">＋ PRESET</button>
          <button id="new-tape-add-local" class="deck-btn-sm">＋ FROM DEVICE</button>
          <button id="new-tape-save" class="deck-btn-action">SAVE TAPE</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Preset track picker modal ── -->
  <div id="preset-picker-modal" class="modal" style="display:none">
    <div class="modal-overlay" id="preset-picker-overlay"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">ADD TRACK</span>
        <button class="deck-btn-sm" id="track-add-from-device" style="font-size:0.65rem;padding:5px 8px;margin-right:4px">FROM DEVICE</button>
        <button class="modal-close" id="preset-picker-close">✕</button>
      </div>
      <div id="preset-picker-list" class="modal-track-list"></div>
    </div>
  </div>

  <!-- Hidden file inputs -->
  <input type="file" id="single-file-input" accept=".mp3,.m4a,.aac,.wav,.ogg,.flac,audio/*" style="display:none">
  <input type="file" id="tape-file-input" accept=".mp3,.m4a,.aac,.wav,.ogg,.flac,audio/*" multiple style="display:none">

  <script src="https://cdn.jsdelivr.net/npm/nosleep.js@0.12.0/dist/NoSleep.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
