<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CassetteRun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Cassette visual ── -->
  <div class="cassette">
    <div class="cassette-label">
      <div class="cassette-app-title">カセット▶▶RUN</div>
      <div class="now-playing-wrap">
        <span id="now-playing-text">---</span>
      </div>
    </div>

    <div class="reel-window">
      <div class="reel" id="reel-left">
        <svg class="reel-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="49" fill="white"/>
          <path fill="#111" d="M84.66 45.13 L95.55 43.60 L95.55 56.40 L84.66 54.87 A35 35 0 0 1 77.95 71.06 L86.74 77.68 L77.68 86.74 L71.06 77.95 A35 35 0 0 1 54.87 84.66 L56.40 95.55 L43.60 95.55 L45.13 84.66 A35 35 0 0 1 28.94 77.95 L22.32 86.74 L13.26 77.68 L22.05 71.06 A35 35 0 0 1 15.34 54.87 L4.45 56.40 L4.45 43.60 L15.34 45.13 A35 35 0 0 1 22.05 28.94 L13.26 22.32 L22.32 13.26 L28.94 22.05 A35 35 0 0 1 45.13 15.34 L43.60 4.45 L56.40 4.45 L54.87 15.34 A35 35 0 0 1 71.06 22.05 L77.68 13.26 L86.74 22.32 L77.95 28.94 A35 35 0 0 1 84.66 45.13 Z"/>
        </svg>
      </div>
      <div class="reel-spacer">
        <div class="tape-rollers">
          <div class="roller"></div>
          <div class="roller"></div>
          <div class="roller"></div>
          <div class="roller"></div>
          <div class="roller"></div>
        </div>
      </div>
      <div class="reel" id="reel-right">
        <svg class="reel-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="49" fill="white"/>
          <path fill="#111" d="M84.66 45.13 L95.55 43.60 L95.55 56.40 L84.66 54.87 A35 35 0 0 1 77.95 71.06 L86.74 77.68 L77.68 86.74 L71.06 77.95 A35 35 0 0 1 54.87 84.66 L56.40 95.55 L43.60 95.55 L45.13 84.66 A35 35 0 0 1 28.94 77.95 L22.32 86.74 L13.26 77.68 L22.05 71.06 A35 35 0 0 1 15.34 54.87 L4.45 56.40 L4.45 43.60 L15.34 45.13 A35 35 0 0 1 22.05 28.94 L13.26 22.32 L22.32 13.26 L28.94 22.05 A35 35 0 0 1 45.13 15.34 L43.60 4.45 L56.40 4.45 L54.87 15.34 A35 35 0 0 1 71.06 22.05 L77.68 13.26 L86.74 22.32 L77.95 28.94 A35 35 0 0 1 84.66 45.13 Z"/>
        </svg>
      </div>
      <div class="tape-path"></div>
      <div id="tape-sag"></div>
    </div>

    <div class="vu-meter">
      <div id="vu-fill"></div>
    </div>

    <!-- Loading indicator (pitch-fixed mode only) -->
    <div id="loading-indicator" style="display:none">
      <div class="loading-header">
        <span id="loading-stage">-</span>
        <span id="loading-step">0 / 3</span>
      </div>
      <div class="loading-track">
        <div id="loading-fill"></div>
      </div>
    </div>

    <div class="info-row">
      <span id="rate-display">0.00x</span>
    </div>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">

    <!-- Track select button -->
    <button id="track-select-btn" class="track-select-btn">
      リストから選曲 <span id="selected-track-name">未選択</span>
    </button>

    <!-- Custom MP3 -->
    <button id="custom-track-btn" class="custom-track-btn">
      自分のMP3を使う
    </button>
    <input type="file" id="file-input"
           accept=".mp3,.m4a,.aac,.wav,.ogg,.flac,audio/*"
           style="display:none">

    <!-- Pitch mode toggle -->
    <div class="pitch-toggle-row">
      <span class="toggle-label" id="toggle-label-l">カセット</span>
      <label class="toggle-switch">
        <input type="checkbox" id="pitch-toggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <span class="toggle-label" id="toggle-label-r">ピッチ固定</span>
    </div>

    <!-- Motion mode toggle -->
    <div class="pitch-toggle-row">
      <span class="toggle-label active" id="motion-label-l">GPS</span>
      <label class="toggle-switch">
        <input type="checkbox" id="motion-toggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <span class="toggle-label" id="motion-label-r">センサー</span>
    </div>

    <!-- Play / Stop -->
    <div class="btn-row">
      <button id="btn-playstop">▶ START</button>
    </div>

  </div>

  <!-- ── Track select modal ── -->
  <div id="track-modal" class="modal" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">TRACK SELECT</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div id="track-list" class="modal-track-list">
        <!-- JS で生成 -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/nosleep.js@0.12.0/dist/NoSleep.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
