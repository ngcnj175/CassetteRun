<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CassetteRun</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Cassette visual ── -->
  <div class="cassette">
    <div class="screws">
      <div class="screw"></div>
      <div class="screw"></div>
    </div>

    <div class="cassette-label">
      <div class="cassette-app-title">CASSETTE▶▶RUN</div>
      <div class="now-playing-wrap">
        <span id="now-playing-text">---</span>
      </div>
    </div>

    <div class="reel-window">
      <div class="reel" id="reel-left"></div>
      <div class="tape-path"></div>
      <div id="tape-sag"></div>
      <div class="reel" id="reel-right"></div>
    </div>

    <div class="vu-meter">
      <div id="vu-fill"></div>
    </div>

    <!-- Loading indicator (pitch-fixed mode only) -->
    <div id="loading-indicator" style="display:none">
      <div class="loading-header">
        <span id="loading-stage">-</span>
        <span id="loading-step">0 / 3</span>
      </div>
      <div class="loading-track">
        <div id="loading-fill"></div>
      </div>
    </div>

    <div class="info-row">
      <span id="rate-display">0.00x</span>
      <span id="status-text">曲を選んでください</span>
    </div>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">

    <!-- Track select button -->
    <button id="track-select-btn" class="track-select-btn">
      🎵 リストから選曲 <span id="selected-track-name">未選択</span>
    </button>

    <!-- Custom MP3 -->
    <button id="custom-track-btn" class="custom-track-btn">
      📂 自分のMP3を使う
    </button>
    <input type="file" id="file-input"
           accept=".mp3,.m4a,.aac,.wav,.ogg,.flac,audio/*"
           style="display:none">

    <!-- Pitch mode toggle -->
    <div class="pitch-toggle-row">
      <span class="toggle-label" id="toggle-label-l">🎞 カセット</span>
      <label class="toggle-switch">
        <input type="checkbox" id="pitch-toggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <span class="toggle-label" id="toggle-label-r">♪ ピッチ固定</span>
    </div>

    <!-- Motion mode toggle -->
    <div class="pitch-toggle-row">
      <span class="toggle-label active" id="motion-label-l">📡 GPS</span>
      <label class="toggle-switch">
        <input type="checkbox" id="motion-toggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <span class="toggle-label" id="motion-label-r">📳 センサー</span>
    </div>

    <!-- Play / Stop -->
    <div class="btn-row">
      <button id="btn-playstop">▶ START</button>
    </div>

    <!-- Desktop simulation -->
    <div class="sim-row">
      <span>DEBUG:</span>
      <input type="range" id="sim-slider" min="0" max="2" step="0.01" value="0">
      <span>2x</span>
    </div>

  </div>

  <footer>走らないと音楽が聴けない</footer>

  <!-- ── Track select modal ── -->
  <div id="track-modal" class="modal" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">TRACK SELECT</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div id="track-list" class="modal-track-list">
        <!-- JS で生成 -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/nosleep.js@0.12.0/dist/NoSleep.min.js"></script>
  <script type="module" src="js/main.js"></script>
  <script>
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      document.getElementById('btn-permission').style.display = 'block';
    }
  </script>
</body>
</html>
